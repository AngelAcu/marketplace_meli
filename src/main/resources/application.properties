spring.application.name=marketplace

### URL de conexion a la BD
spring.datasource.url=jdbc:mysql://localhost:3306/marketplace?createDatabaseIfNotExist=true&serverTimezone=UTC

## Credenciales de acceso de tu MySQL local
spring.datasource.username=root
spring.datasource.password=

## Driver del conector
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

## Actualiza la estructura de las tablas automaticamente
spring.jpa.hibernate.ddl-auto=update

## Muestra las consultas SQL en la consola (util para pruebas)
spring.jpa.show-sql=true
spring.jpa.propierties.hibernate.format_sql=true